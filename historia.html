<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nasza Historia</title>
  
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
</head>
<body class="bg-cream text-ink font-sans min-h-[100dvh] antialiased fade-in">
  
  <main id="history-wrapper" class="h-[100dvh] w-full relative overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cream via-[#FDF1EB] to-[#F1D8D6]">
    
    <a href="index.html" class="absolute top-6 left-6 z-50 w-12 h-12 flex items-center justify-center rounded-full bg-rosegold/20 text-ink shadow-sm backdrop-blur-md hover:bg-rosegold/40 transition-colors duration-300" aria-label="Wróć">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
    </a>

    <div id="history-slider" class="relative z-10 flex h-full w-full overflow-x-auto snap-x snap-mandatory scroll-smooth hide-scrollbar">
    </div>

    <div class="absolute bottom-0 w-full h-28 bg-gradient-to-t from-cream via-cream/90 to-transparent pointer-events-none z-20">
      <div class="absolute top-1/2 left-0 w-full h-px bg-gradient-to-r from-transparent via-rosegold/60 to-transparent transform -translate-y-1/2"></div>
      <div id="dynamic-timeline" class="absolute top-0 left-0 w-full h-full"></div>
    </div>

  </main>

  <script src="transitions.js"></script>
  <script src="historia-baza.js"></script> <script src="historia.js"></script> </body>
</html>
